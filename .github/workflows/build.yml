name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: amigadev/m68k-amigaos-gcc:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install make
        run: |
          apt-get update
          apt-get install -y make

      - name: Build
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ftpd
          path: build/ftpd
